name: CI

on:
  push:
    branches:
      - main
      - dev
      - codex/**
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check .

      - name: Mypy
        run: |
          set +e
          python -m mypy src --show-error-codes --show-error-context 2>&1 | tee /tmp/mypy-output.txt
          MYPY_EXIT=${PIPESTATUS[0]}
          echo "--- mypy exit code: $MYPY_EXIT ---"
          if [ $MYPY_EXIT -ne 0 ]; then
            echo "Mypy failed with exit code $MYPY_EXIT"
            cat /tmp/mypy-output.txt
            exit $MYPY_EXIT
          fi

      - name: Pytest
        run: python -m pytest -q

      - name: Build
        run: python -m build
