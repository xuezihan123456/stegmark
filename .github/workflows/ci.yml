name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install --upgrade pip
          pip install -e .[dev]
      - name: Test
        id: test
        continue-on-error: true
        run: python -m pytest tests/ -v --tb=long 2>&1 | tee /tmp/pytest-out.txt
      - name: Show test output
        if: steps.test.outcome == 'failure'
        run: cat /tmp/pytest-out.txt
